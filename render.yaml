services:
  - type: web
    name: FarmConnect Backend
    env: node
    region: oregon
    plan: starter
    buildCommand: NODE_ENV=development npm install && cd packages/prisma && NODE_ENV=development npm install && npx prisma generate && cd ../.. && cd apps/backend && NODE_ENV=development npm install && npm run build && npx prisma migrate deploy
    startCommand: cd apps/backend && NODE_ENV=production npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BACKEND_PORT
        value: 10000
      - key: AI_SERVICE_URL
        value: http://localhost:8000
    healthCheckPath: /health
    autoDeploy: true
