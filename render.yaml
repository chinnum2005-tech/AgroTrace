services:
  - type: web
    name: FarmConnect Backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install --include=dev && cd packages/prisma && npm install --include=dev && npx prisma generate && cd ../../apps/backend && npm install --include=dev && npm run build && npx prisma migrate deploy  # Fixed paths
    startCommand: cd apps/backend && NODE_ENV=production npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: BACKEND_PORT
        value: 10000
      - key: AI_SERVICE_URL
        value: http://localhost:8000
      - key: CORS_ORIGIN
        value: '*'
    healthCheckPath: /health
    autoDeploy: true
