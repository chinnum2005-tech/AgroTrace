version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: agritrace-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT:-3001}
      AI_SERVICE_URL: http://ai-service:${AI_SERVICE_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    networks:
      - agritrace-network
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on: []

  # AI Service (Python FastAPI)
  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: agritrace-ai
    environment:
      PORT: ${AI_SERVICE_PORT:-8000}
    ports:
      - "${AI_SERVICE_PORT:-8000}:${AI_SERVICE_PORT:-8000}"
    networks:
      - agritrace-network
    volumes:
      - ./services/ai-service:/app

  # Web Frontend (React + Vite)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agritrace-web
    environment:
      VITE_BACKEND_URL: ${BACKEND_URL:-http://localhost:3001}
      VITE_AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - agritrace-network
    volumes:
      - ./apps/web:/app
      - /app/node_modules

networks:
  agritrace-network:
    driver: bridge
