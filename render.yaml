services:
  - type: web
    name: FarmConnect Backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run render:build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BACKEND_PORT
        value: 10000
      - key: AI_SERVICE_URL
        value: http://localhost:8000
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: neon-db
    databaseUrl: ${DATABASE_URL}
